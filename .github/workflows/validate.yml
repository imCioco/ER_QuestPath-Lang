name: Validate translations

on:
  pull_request:
    paths:
      - "*.json"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Run validate.py
        run: python validate.py
